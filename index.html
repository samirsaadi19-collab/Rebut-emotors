<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0c0f">
<title>EDCT</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0f;--s1:#12151b;--s2:#1a1f2a;--s3:#222838;
  --b1:#252d3d;--b2:#2e3a50;--b3:#3a4a64;
  --accent:#f59e0b;--red:#ef4444;--green:#10b981;--blue:#3b82f6;
  --t1:#eef0f6;--t2:#8892aa;--t3:#4a5570;
  --r:6px;--r2:12px;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:var(--fb);font-size:14px;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
#app{display:flex;flex-direction:column;min-height:100vh}
#main{flex:1;padding:16px 16px 76px;max-width:600px;margin:0 auto;width:100%}
@media(min-width:768px){#app{flex-direction:row}#main{margin-left:72px;padding:24px 32px;max-width:900px}}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--b1);display:flex;z-index:100;height:60px}
@media(min-width:768px){#nav{top:0;left:0;bottom:0;right:auto;width:72px;flex-direction:column;border-top:none;border-right:1px solid var(--b1);height:auto;padding:12px 0}}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--t3);cursor:pointer;font-family:var(--fd);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:6px 4px;transition:color .15s}
@media(min-width:768px){.nb{flex:0;padding:14px 8px}}
.nb:hover{color:var(--t2)}.nb.on{color:var(--accent)}
.nb.on svg{filter:drop-shadow(0 0 5px rgba(245,158,11,.5))}
.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* SYNC */
#sync-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--b1);z-index:200;display:none}
#sync-bar.show{display:block}
#sync-fill{height:100%;background:var(--accent);width:0;transition:width .3s}
#offline-badge{position:fixed;top:8px;right:8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;z-index:200;display:none}
#offline-badge.show{display:block}

.ph{margin-bottom:20px}
.pt{font-family:var(--fd);font-size:30px;font-weight:900;text-transform:uppercase;line-height:1}
.ps{font-size:12px;color:var(--t3);margin-top:3px}
.al{width:36px;height:3px;background:var(--accent);margin-top:8px;border-radius:2px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.ct{font-family:var(--fd);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:12px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:14px}
.sv{font-family:var(--fd);font-size:38px;font-weight:900;line-height:1;color:var(--accent)}
.sl2{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;font-weight:600}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:6px}
.field select,.field input,.field textarea{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1);padding:10px 12px;font-size:14px;outline:none;font-family:var(--fb);transition:border-color .15s}
.field select:focus,.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:70px}
.field select option{background:var(--s2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--fd);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;transition:all .15s}
.bp{background:var(--accent);color:#0a0c0f}.bp:hover{background:#fbbf24}
.bg{background:var(--s2);color:var(--t2);border:1px solid var(--b1)}.bg:hover{color:var(--t1);border-color:var(--b2)}
.bd{background:var(--red);color:#fff}
.bsm{padding:6px 12px;font-size:12px}
.bfw{width:100%;justify-content:center;padding:14px;font-size:16px}
.bi{padding:7px;border-radius:var(--r);border:1px solid var(--b1);background:var(--s2);color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;transition:all .15s}
.bi:hover{color:var(--t1);border-color:var(--b2)}
.bi.danger:hover{color:var(--red);border-color:var(--red)}
.bi svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cg{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:6px 13px;border-radius:20px;border:1px solid var(--b1);background:var(--s2);color:var(--t2);font-size:13px;cursor:pointer;transition:all .12s;font-weight:500;user-select:none}
.chip:hover{border-color:var(--b2);color:var(--t1)}
.chip.on{background:rgba(245,158,11,.12);border-color:var(--accent);color:var(--accent)}
.qw{display:flex;align-items:center}
.qb{width:40px;height:40px;background:var(--s2);border:1px solid var(--b1);color:var(--t1);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;flex-shrink:0;touch-action:manipulation;user-select:none;}
.qb-minus{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:#22c55e}
.qb-plus{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#ef4444}
.qb:first-child{border-radius:var(--r) 0 0 var(--r)}.qb:last-child{border-radius:0 var(--r) var(--r) 0}
.qb:hover{background:var(--b1)}
.qi{width:64px!important;height:40px;text-align:center;border-radius:0!important;border-left:none!important;border-right:none!important;font-size:18px!important;font-weight:700!important}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.tl{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.tt{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.25)}
.tm{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.br{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bl{font-size:11px;font-weight:600;color:var(--t2);min-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bt{flex:1;height:7px;background:var(--s2);border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px;background:var(--accent);transition:width .4s ease}
.bf.g{background:var(--green)}.bf.r{background:var(--red)}.bf.b{background:var(--blue)}
.bv{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--t1);min-width:28px;text-align:right}
.rr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1)}
.rr:last-child{border-bottom:none}
.rn{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--t3);min-width:28px}
.rl{flex:1;font-weight:600;font-size:14px}
.rv{font-family:var(--fd);font-size:20px;font-weight:800;color:var(--accent)}
.pu{border:2px dashed var(--b1);border-radius:var(--r2);padding:18px;text-align:center;cursor:pointer;transition:border-color .15s}
.pu:hover{border-color:var(--b2)}
.pu svg{width:28px;height:28px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto}
.pu p{color:var(--t3);font-size:12px;margin-top:6px}
.pp{width:100%;max-height:180px;object-fit:cover;border-radius:var(--r);margin-top:10px}
.div{height:1px;background:var(--b1);margin:16px 0}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--s1);border:1px solid var(--accent);color:var(--t1);padding:11px 20px;border-radius:var(--r2);font-size:13px;font-weight:500;z-index:500;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.4);transition:transform .25s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--red)}
#undo{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--s2);border:1px solid var(--b2);border-radius:24px;padding:9px 18px;display:flex;align-items:center;gap:12px;font-size:13px;z-index:90;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:all .25s;pointer-events:none}
#undo.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
@media(min-width:768px){#undo{bottom:24px}}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
#modal.show{display:flex}
.mbox{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.mh{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.mt{font-family:var(--fd);font-size:18px;font-weight:700;text-transform:uppercase}
.mb{padding:18px}
.sw{position:relative;margin-bottom:12px}
.sw input{padding-left:36px!important}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
.si svg{width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.fr{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.fs{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);color:var(--t2);padding:6px 10px;font-size:12px;outline:none;font-family:var(--fb)}
.fs:focus{border-color:var(--accent)}
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty svg{width:40px;height:40px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 12px;opacity:.4}
.hc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.sl3{font-family:var(--fd);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin:18px 0 10px}
.sl3:first-child{margin-top:0}
.rc{display:flex;align-items:center;gap:12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:12px;margin-bottom:10px}
.rimg{width:46px;height:46px;border-radius:var(--r);background:var(--s2);border:1px solid var(--b1);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rimg img{width:100%;height:100%;object-fit:cover}
.rimg svg{width:20px;height:20px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--t3);gap:10px}
.spinner{width:20px;height:20px;border:2px solid var(--b2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="sync-bar"><div id="sync-fill"></div></div>
<div id="offline-badge">● HORS LIGNE</div>
<div id="app">
  <nav id="nav">
    <button class="nb on" onclick="go('declare')" id="nb-declare">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Déclarer
    </button>
    <button class="nb" onclick="go('dash')" id="nb-dash">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Tableau
    </button>
    <button class="nb" onclick="go('rank')" id="nb-rank">
      <svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>Classement
    </button>
    <button class="nb" onclick="go('history')" id="nb-history">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Historique
    </button>
    <button class="nb" onclick="go('refs')" id="nb-refs">
      <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>Références
    </button>
    <button class="nb" onclick="go('users')" id="nb-users">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Équipe
    </button>
    <button class="nb" onclick="go('export')" id="nb-export">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export
    </button>
  </nav>
  <main id="main"><div class="loading"><div class="spinner"></div> Connexion…</div></main>
</div>
<div id="toast"></div>
<div id="undo">
  <span style="color:var(--t2)">Dernière déclaration</span>
  <button class="btn bg bsm" onclick="undoLast()" style="display:flex;align-items:center;gap:6px">
    <svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
    Annuler
  </button>
</div>
<div id="modal">
  <div class="mbox">
    <div class="mh">
      <div class="mt" id="modal-title"></div>
      <button class="bi" onclick="closeModal()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="mb" id="modal-body"></div>
  </div>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://lhpohreelrnlgvoqaejg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxocG9ocmVlbHJubGd2b3FhZWpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTk5NDUsImV4cCI6MjA5NjI3NTk0NX0.vigfdt00IdUsFCbA3mXnFiNGwSmPZdST3tSepLd-rr4';
const HEADERS = {
  'Content-Type':'application/json',
  'apikey':SUPABASE_KEY,
  'Prefer':'return=representation'
};

// Appels REST directs — remplace le client Supabase JS (cause DataCloneError sur Safari/iOS)
async function sbSelect(table,opts={}){
  let url=`${SUPABASE_URL}/rest/v1/${table}?select=*&apikey=${SUPABASE_KEY}`;
  if(opts.order) url+=`&order=${opts.order}`;
  if(opts.limit) url+=`&limit=${opts.limit}`;
  if(opts.eq) Object.entries(opts.eq).forEach(([k,v])=>url+=`&${k}=eq.${encodeURIComponent(v)}`);
  const res=await fetch(url,{method:'GET',headers:{'Content-Type':'application/json'}});
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}
async function sbInsert(table,row){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?apikey=${SUPABASE_KEY}`,{method:'POST',headers:HEADERS,body:JSON.stringify(row)});
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}
async function sbUpdate(table,id,row){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}&apikey=${SUPABASE_KEY}`,{method:'PATCH',headers:HEADERS,body:JSON.stringify(row)});
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}
async function sbDelete(table,id){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}&apikey=${SUPABASE_KEY}`,{method:'DELETE',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY}});
  if(!res.ok)throw new Error(await res.text());
  return true;
}

// ── CONSTANTES ────────────────────────────────────────────────────────────────
const LINES = ['Dress','Main','Shaft'];
const TEAMS = ['Matin','Midi','Nuit','SD Jour','SD Nuit','VSD Jour','VSD Nuit'];
const MOTIFS = ['Cassée','Déformée','Rayée','Hors tolérance','Bavure','Tombée au sol / souillée','Mélange de références','Oxydation / corrosion','Autre'];
const MEDALS = ['🥇','🥈','🥉'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = { tab:'declare', decls:[], refs:[], users:[], lastDecl:null, undoTimer:null };

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  checkOnline();
  window.addEventListener('online', ()=>{ document.getElementById('offline-badge').classList.remove('show'); loadAll(); });
  window.addEventListener('offline', ()=>{ document.getElementById('offline-badge').classList.add('show'); });
  // Charger le cache local immediatement
  loadCache();
  render();
  // Puis charger depuis Supabase avec retry
  loadAllWithRetry();
}

function checkOnline(){
  if(!navigator.onLine) document.getElementById('offline-badge').classList.add('show');
}

// Cache local (localStorage)
function loadCache(){
  try {
    const refs=localStorage.getItem('cache_refs');
    const decls=localStorage.getItem('cache_decls');
    const users=localStorage.getItem('cache_users');
    if(refs) state.refs=JSON.parse(refs);
    if(decls) state.decls=JSON.parse(decls);
    if(users) state.users=JSON.parse(users);
  } catch(e){}
}
function saveCache(){
  try {
    localStorage.setItem('cache_refs', JSON.stringify(state.refs));
    localStorage.setItem('cache_decls', JSON.stringify(state.decls));
    localStorage.setItem('cache_users', JSON.stringify(state.users));
  } catch(e){}
}

// Retry automatique si Supabase ne repond pas
let retryTimer=null;
async function loadAllWithRetry(attempt=1){
  clearTimeout(retryTimer);
  const ok = await loadAll();
  if(!ok){
    const delay = Math.min(attempt*5000, 30000); // 5s, 10s, 15s... max 30s
    retryTimer=setTimeout(()=>loadAllWithRetry(attempt+1), delay);
  }
}

async function loadAll(){
  const results = await Promise.all([loadDecls(), loadRefs(), loadUsers()]);
  const ok = results.some(r=>r===true);
  if(ok) saveCache();
  return ok;
}

async function loadDecls(){
  try {
    const data=await sbSelect('declarations',{order:'created_at.desc',limit:1000});
    state.decls=data; saveCache(); render(); return true;
  } catch(e){ console.warn('loadDecls:',e?.message||e); }
  return false;
}

async function loadRefs(){
  try {
    const data=await sbSelect('references_pieces',{order:'ref.asc',limit:1000});
    state.refs=data; saveCache(); render(); return true;
  } catch(e){ console.warn('loadRefs:',e?.message||e); }
  return false;
}

async function loadUsers(){
  try {
    const data=await sbSelect('utilisateurs',{order:'nom.asc',limit:1000});
    state.users=data; saveCache(); render(); return true;
  } catch(e){ console.warn('loadUsers:',e?.message||e); }
  return false;
}

// ── SYNC INDICATOR ────────────────────────────────────────────────────────────
function syncStart(){
  const bar=document.getElementById('sync-bar');
  const fill=document.getElementById('sync-fill');
  bar.classList.add('show');
  fill.style.width='0%';
  setTimeout(()=>fill.style.width='60%',50);
}
function syncEnd(){
  const fill=document.getElementById('sync-fill');
  fill.style.width='100%';
  setTimeout(()=>{ document.getElementById('sync-bar').classList.remove('show'); fill.style.width='0%'; },400);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmtDate(iso){ return new Date(iso).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function todayStart(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function weekStart(){ const d=todayStart(); d.setDate(d.getDate()-d.getDay()+1); return d; }
function monthStart(){ const d=todayStart(); d.setDate(1); return d; }

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.innerHTML=(type==='ok'?'✓ ':'⚠ ')+msg;
  el.className='show'+(type==='err'?' err':'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.className='',3000);
}

// ── UNDO ──────────────────────────────────────────────────────────────────────
function showUndo(){
  document.getElementById('undo').classList.add('show');
  if(state.undoTimer)clearTimeout(state.undoTimer);
  state.undoTimer=setTimeout(()=>document.getElementById('undo').classList.remove('show'),8000);
}
async function undoLast(){
  if(!state.lastDecl)return;
  syncStart();
  await sbDelete('declarations',state.lastDecl.id);
  state.lastDecl=null;
  document.getElementById('undo').classList.remove('show');
  await loadDecls();
  syncEnd();
  toast('Déclaration annulée','err');
  render();
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function go(tab){
  state.tab=tab;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('nb-'+tab).classList.add('on');
  render();
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(title,html){ document.getElementById('modal-title').textContent=title; document.getElementById('modal-body').innerHTML=html; document.getElementById('modal').classList.add('show'); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const m=document.getElementById('main');
  if(state.tab==='declare') m.innerHTML=renderDeclare();
  if(state.tab==='dash') m.innerHTML=renderDash();
  if(state.tab==='rank') m.innerHTML=renderRank();
  if(state.tab==='history') m.innerHTML=renderHistory();
  if(state.tab==='refs') m.innerHTML=renderRefs();
  if(state.tab==='users') m.innerHTML=renderUsers();
  if(state.tab==='export') m.innerHTML=renderExport();
}

// ── DECLARE ───────────────────────────────────────────────────────────────────

        <option value="">— Sélectionner —</option>

    <div class="field"><label>Ligne *</label>
      <div class="cg" id="cg-ligne">${LINES.map(l=>`<div class="chip" onclick="selectChipAndFilterRefs('cg-ligne',this,'${l}')">${l}</div>`).join('')}</div>
      <div id="err-ligne"></div>
    </div>
    <div class="field"><label>Référence *</label>
      <select id="d-ref" onchange="onRefChange()">

    </div>

        <button class="qb qb-plus" onclick="adjQty(1)">+</button>

      <div id="cost-preview" style="margin-top:6px;font-size:12px;color:var(--t3)"></div>
    </div>
    <div class="field"><label>Motif *</label>
      <div class="cg" id="cg-motif">${MOTIFS.map(m=>`<div class="chip" onclick="selectChip('cg-motif',this)">${m}</div>`).join('')}</div>
      <div id="err-motif"></div>
    </div>
    <div class="field"><label>Commentaire <span style="font-weight:400;text-transform:none;color:var(--t3)">(facultatif)</span></label>
      <textarea id="d-comment" placeholder="Détails…"></textarea>
    </div>
    <div class="field"><label>Photo <span style="font-weight:400;text-transform:none;color:var(--t3)">(facultative)</span></label>
      <div class="pu" onclick="document.getElementById('d-photo').click()">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <p>Appuyer pour ajouter une photo</p>
        <input type="file" id="d-photo" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this,'photo-preview')">

function selectChipAndFilterRefs(groupId, el, ligne){
  selectChip(groupId, el);
  // Filtrer les références par ligne
  const refsForLine = ligne ? state.refs.filter(r => !r.lignes || r.lignes.length===0 || r.lignes.includes(ligne)) : state.refs;
  const sel = document.getElementById('d-ref');
  if(!sel) return;
  sel.innerHTML = `<option value="">— Sélectionner —</option>` +
    refsForLine.map(r=>`<option value="${r.ref}">${r.ref} — ${r.designation}${r.prix_unitaire>0?' ('+parseFloat(r.prix_unitaire).toFixed(2)+'€)':''}</option>`).join('');
  document.getElementById('ref-photo').innerHTML='';
  document.getElementById('ref-prix').innerHTML='';
  document.getElementById('cost-preview').innerHTML='';
}

function updateCostPreview(){
  const ref = document.getElementById('d-ref')?.value;
  const qty = parseInt(document.getElementById('d-qty')?.value)||1;
  const r = state.refs.find(x=>x.ref===ref);
  const el = document.getElementById('cost-preview');
  if(el && r && r.prix_unitaire>0){
    const total = (parseFloat(r.prix_unitaire)*qty).toFixed(2);
    el.innerHTML = `💰 Coût estimé : <strong style="color:var(--red)">${total} €</strong>`;
  } else if(el) el.innerHTML='';
}

function onRefChange(){
  const ref=document.getElementById('d-ref').value;
  const r=state.refs.find(x=>x.ref===ref);
  const elPhoto=document.getElementById('ref-photo');
  const elPrix=document.getElementById('ref-prix');
  if(elPhoto) elPhoto.innerHTML=r&&r.photo?`<img src="${r.photo}" class="pp" style="margin-top:8px">`:'';
  if(elPrix && r && r.prix_unitaire>0) elPrix.innerHTML=`<div style="font-size:12px;color:var(--t2);margin-top:6px">Prix unitaire : <strong style="color:var(--accent)">${parseFloat(r.prix_unitaire).toFixed(2)} €</strong></div>`;
  else if(elPrix) elPrix.innerHTML='';
  updateCostPreview();
}

function selectChip(groupId,el){
  document.querySelectorAll('#'+groupId+' .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}

function adjQty(d){ const i=document.getElementById('d-qty'); i.value=Math.max(1,(parseInt(i.value)||1)+d); }

function previewPhoto(input,previewId){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById(previewId).innerHTML=`
      <div style="position:relative">
        <img src="${e.target.result}" class="pp">
        <button class="bi" style="position:absolute;top:16px;right:8px" onclick="document.getElementById('${previewId}').innerHTML='';document.getElementById('${input.id}').value=''">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
  };
  reader.readAsDataURL(file);
}

function getChipVal(groupId){ const el=document.querySelector('#'+groupId+' .chip.on'); return el?el.textContent.trim():''; }

async function submitDecl(){
  const user=document.getElementById('d-user').value;
  const ref=document.getElementById('d-ref').value;
  const ligne=getChipVal('cg-ligne');
  const equipe=getChipVal('cg-equipe');
  const qty=parseInt(document.getElementById('d-qty').value)||1;
  const motif=getChipVal('cg-motif');
  const comment=document.getElementById('d-comment').value;
  const photoEl=document.querySelector('#photo-preview img');
  const photo=photoEl?photoEl.src:null;

  let ok=true;
  if(!user){document.getElementById('d-user').style.borderColor='var(--red)';ok=false;}else document.getElementById('d-user').style.borderColor='';
  if(!ref){document.getElementById('d-ref').style.borderColor='var(--red)';ok=false;}else document.getElementById('d-ref').style.borderColor='';
  ['ligne','equipe','motif'].forEach(k=>{
    const val=k==='ligne'?ligne:k==='equipe'?equipe:motif;
    const el=document.getElementById('err-'+k);
    if(!val){el.innerHTML='<div style="color:var(--red);font-size:11px;margin-top:3px">Requis</div>';ok=false;}else el.innerHTML='';
  });
  if(!ok)return;

  syncStart();
  try {
    const inserted=await sbInsert('declarations',{utilisateur:user,ref,ligne,equipe,qty,motif,comment,photo});
    const data=Array.isArray(inserted)?inserted[0]:inserted;
    state.lastDecl=data;
    await loadDecls();
    syncEnd();
    showUndo();
    toast('Déclaration enregistrée ✓');
    go('dash');
  } catch(e){ toast('Erreur: '+(e?.message||e),'err'); syncEnd(); }
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function groupBy(arr,key){ const m={}; arr.forEach(d=>{m[d[key]]=(m[d[key]]||0)+d.qty}); return Object.entries(m).sort((a,b)=>b[1]-a[1]); }
function bars(data,max,cls=''){ if(!data.length)return '<div style="color:var(--t3);font-size:13px">Aucune donnée</div>'; return data.map(([l,v])=>`<div class="br"><div class="bl" title="${l}">${l}</div><div class="bt"><div class="bf${cls}" style="width:${max?(v/max)*100:0}%"></div></div><div class="bv">${v}</div></div>`).join(''); }

function renderDash(){
  const now=new Date();
  const td=state.decls.filter(d=>new Date(d.created_at)>=todayStart());
  const wd=state.decls.filter(d=>new Date(d.created_at)>=weekStart());
  const md=state.decls.filter(d=>new Date(d.created_at)>=monthStart());
  const sum=arr=>arr.reduce((s,d)=>s+(d.qty||0),0);
  const cost=arr=>{
    return arr.reduce((s,d)=>{
      const r=state.refs.find(x=>x.ref===d.ref);
      return s+(r&&r.prix_unitaire?(parseFloat(r.prix_unitaire)*d.qty):0);
    },0);
  };
  const top10=Object.entries(state.decls.reduce((m,d)=>{m[d.ref]=(m[d.ref]||0)+d.qty;return m},{})).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const topM=groupBy(state.decls,'motif');
  const wl=groupBy(wd,'ligne'),we=groupBy(wd,'equipe');
  const ml=groupBy(md,'ligne'),me=groupBy(md,'equipe');
  return `
  <div class="ph"><div class="pt">Tableau de bord</div><div class="ps">${now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div><div class="al"></div></div>
  <div class="sl3">Aujourd'hui</div>
  <div class="sg">
    <div class="sc"><div class="sv">${td.length}</div><div class="sl2">Déclarations</div></div>
    <div class="sc"><div class="sv" style="color:var(--red)">${sum(td)}</div><div class="sl2">Pièces rebutées</div></div>
  </div>
  <div class="sg">
    <div class="sc"><div class="sv" style="color:var(--accent);font-size:28px">${cost(td).toFixed(2)} €</div><div class="sl2">Coût du jour</div></div>
    <div class="sc"><div class="sv" style="color:var(--red);font-size:28px">${cost(state.decls).toFixed(2)} €</div><div class="sl2">Coût total</div></div>
  </div>
  <div class="sl3">Cette semaine</div>
  <div class="card"><div class="ct">Par ligne</div>${bars(wl,Math.max(...wl.map(x=>x[1]),1))}</div>
  <div class="card"><div class="ct">Par équipe</div>${bars(we,Math.max(...we.map(x=>x[1]),1),' g')}</div>
  <div class="sl3">Ce mois-ci</div>
  <div class="card"><div class="ct">Par ligne</div>${bars(ml,Math.max(...ml.map(x=>x[1]),1))}</div>
  <div class="card"><div class="ct">Par équipe</div>${bars(me,Math.max(...me.map(x=>x[1]),1),' g')}</div>
  <div class="sl3">Top 10 références</div>
  <div class="card">${bars(top10,Math.max(...top10.map(x=>x[1]),1),' r')}</div>
  <div class="sl3">Top motifs</div>
  <div class="card">${bars(topM.slice(0,8),Math.max(...topM.map(x=>x[1]),1))}</div>`;
}

// ── RANKING ───────────────────────────────────────────────────────────────────
function renderRank(){
  const rl=groupBy(state.decls,'ligne'),re=groupBy(state.decls,'equipe');
  const rows=(data,cls)=>data.length?data.map(([n,v],i)=>`<div class="rr"><div class="rn">${MEDALS[i]||'#'+(i+1)}</div><div class="rl"><span class="tag ${cls}">${n}</span></div><div class="rv">${v}</div></div>`).join(''):'<div style="color:var(--t3);font-size:13px">Aucune donnée</div>';
  return `
  <div class="ph"><div class="pt">Classements</div><div class="ps">Par pièces rebutées totales</div><div class="al"></div></div>
  <div class="sl3">Classement lignes</div><div class="card">${rows(rl,'tl')}</div>
  <div class="sl3">Classement équipes</div><div class="card">${rows(re,'tt')}</div>`;
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
let hF={date:'',ref:'',ligne:'',equipe:'',user:'',motif:'',q:''};
let editId=null;

function renderHistory(){
  const filtered=filterDecls();
  const allRefs=[...new Set(state.decls.map(d=>d.ref))];
  return `
  <div class="ph"><div class="pt">Historique</div><div class="ps">${filtered.length} déclaration${filtered.length>1?'s':''}</div><div class="al"></div></div>
  <div class="sw"><div class="si"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
    <input class="field" type="text" placeholder="Rechercher…" value="${hF.q}" oninput="hF.q=this.value;refreshHistory()" style="background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1);padding:8px 12px 8px 36px;width:100%;outline:none;font-family:var(--fb)">
  </div>
  <div class="fr">
    <input type="date" class="fs" value="${hF.date}" onchange="hF.date=this.value;refreshHistory()">
    <select class="fs" onchange="hF.ref=this.value;refreshHistory()"><option value="">Toutes réf.</option>${allRefs.map(r=>`<option${hF.ref===r?' selected':''}>${r}</option>`).join('')}</select>
    <select class="fs" onchange="hF.ligne=this.value;refreshHistory()"><option value="">Toutes lignes</option>${LINES.map(l=>`<option${hF.ligne===l?' selected':''}>${l}</option>`).join('')}</select>
    <select class="fs" onchange="hF.equipe=this.value;refreshHistory()"><option value="">Toutes équipes</option>${TEAMS.map(t=>`<option${hF.equipe===t?' selected':''}>${t}</option>`).join('')}</select>
    <select class="fs" onchange="hF.user=this.value;refreshHistory()"><option value="">Tous users</option>${state.users.map(u=>`<option${hF.user===u.nom?' selected':''}>${u.nom}</option>`).join('')}</select>
    <select class="fs" onchange="hF.motif=this.value;refreshHistory()"><option value="">Tous motifs</option>${MOTIFS.map(m=>`<option${hF.motif===m?' selected':''}>${m}</option>`).join('')}</select>
  </div>
  <div id="hist-list">${renderHistList(filtered)}</div>`;
}

function filterDecls(){
  return state.decls.filter(d=>{
    if(hF.ref&&d.ref!==hF.ref)return false;
    if(hF.ligne&&d.ligne!==hF.ligne)return false;
    if(hF.equipe&&d.equipe!==hF.equipe)return false;
    if(hF.user&&d.utilisateur!==hF.user)return false;
    if(hF.motif&&d.motif!==hF.motif)return false;
    if(hF.date&&new Date(d.created_at).toISOString().slice(0,10)!==hF.date)return false;
    if(hF.q){const q=hF.q.toLowerCase();if(!d.ref.toLowerCase().includes(q)&&!d.utilisateur.toLowerCase().includes(q)&&!d.motif.toLowerCase().includes(q))return false;}
    return true;
  });
}

function renderHistList(filtered){
  if(!filtered.length)return `<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><div>Aucune déclaration</div></div>`;
  return filtered.map(d=>`<div class="hc" id="hc-${d.id}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div><div style="font-family:var(--fd);font-size:16px;font-weight:700">${d.ref}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:2px">${fmtDate(d.created_at)} · ${d.utilisateur}</div></div>
      <div style="font-family:var(--fd);font-size:26px;font-weight:900;color:var(--red)">${d.qty}</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
      <span class="tag tl">${d.ligne}</span><span class="tag tt">${d.equipe}</span><span class="tag tm">${d.motif}</span>
    </div>
    ${d.comment?`<div style="font-size:12px;color:var(--t3);margin-bottom:8px">${d.comment}</div>`:''}
    ${d.photo?`<img src="${d.photo}" style="width:100%;max-height:110px;object-fit:cover;border-radius:var(--r);margin-bottom:8px">`:''}
    <div style="display:flex;gap:7px">
      <button class="bi" onclick="editDecl('${d.id}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="bi danger" onclick="deleteDecl('${d.id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
    </div>
  </div>`).join('');
}

function refreshHistory(){ const el=document.getElementById('hist-list'); if(el)el.innerHTML=renderHistList(filterDecls()); }

async function deleteDecl(id){
  syncStart();
  await sbDelete('declarations',id);
  await loadDecls();
  syncEnd();
  toast('Déclaration supprimée','err');
  refreshHistory();
}

function editDecl(id){
  const d=state.decls.find(x=>x.id===id);if(!d)return;
  editId=id;
  openModal('Modifier la déclaration',`
    <div class="field"><label>Référence</label><select id="e-ref">${state.refs.map(r=>`<option value="${r.ref}"${r.ref===d.ref?' selected':''}>${r.ref} — ${r.designation}</option>`).join('')}</select></div>
    <div class="field"><label>Ligne</label><div class="cg" id="ecg-ligne">${LINES.map(l=>`<div class="chip${l===d.ligne?' on':''}" onclick="selectChip('ecg-ligne',this)">${l}</div>`).join('')}</div></div>
    <div class="field"><label>Équipe</label><div class="cg" id="ecg-equipe">${TEAMS.map(t=>`<div class="chip${t===d.equipe?' on':''}" onclick="selectChip('ecg-equipe',this)">${t}</div>`).join('')}</div></div>
    <div class="field"><label>Quantité</label><input type="number" id="e-qty" min="1" value="${d.qty}"></div>
    <div class="field"><label>Motif</label><div class="cg" id="ecg-motif">${MOTIFS.map(m=>`<div class="chip${m===d.motif?' on':''}" onclick="selectChip('ecg-motif',this)">${m}</div>`).join('')}</div></div>
    <div class="field"><label>Commentaire</label><textarea id="e-comment">${d.comment||''}</textarea></div>
    <button class="btn bp bfw" onclick="saveEdit()"><svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Sauvegarder</button>`);
}

async function saveEdit(){
  const i=state.decls.findIndex(x=>x.id===editId);if(i<0)return;
  const updates={ref:document.getElementById('e-ref').value,ligne:getChipVal('ecg-ligne')||state.decls[i].ligne,equipe:getChipVal('ecg-equipe')||state.decls[i].equipe,qty:parseInt(document.getElementById('e-qty').value)||1,motif:getChipVal('ecg-motif')||state.decls[i].motif,comment:document.getElementById('e-comment').value};
  syncStart();
  await sbUpdate('declarations',editId,updates);
  await loadDecls();
  syncEnd();
  closeModal();
  toast('Déclaration modifiée ✓');
  refreshHistory();
}

// ── REFS ──────────────────────────────────────────────────────────────────────
function renderRefs(){
  return `
  <div class="ph">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div class="pt">Références</div><div class="ps">${state.refs.length} référence${state.refs.length>1?'s':''}</div></div>
      <button class="btn bp bsm" onclick="openAddRef()" style="margin-top:4px;display:flex;align-items:center;gap:6px"><svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Ajouter</button>
    </div><div class="al"></div>
  </div>
  ${state.refs.length===0?`<div style="text-align:center;padding:32px 20px;background:var(--s1);border:2px dashed var(--b2);border-radius:var(--r2)"><div style="font-size:36px;margin-bottom:10px">📦</div><div style="font-family:var(--fd);font-size:20px;font-weight:700;color:var(--t2);margin-bottom:6px">Aucune référence</div><div style="font-size:13px;color:var(--t3);margin-bottom:16px;line-height:1.6">Ajoutez vos pièces une par une.</div><button class="btn bp bsm" onclick="openAddRef()" style="display:inline-flex;align-items:center;gap:6px;margin:0 auto"><svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Commencer l'ajout</button></div>`:
  state.refs.map(r=>`<div class="rc">
    <div class="rimg">${r.photo?`<img src="${r.photo}">`:`<svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`}</div>
    <div style="flex:1;min-width:0">
      <div style="font-family:var(--fd);font-weight:700;font-size:15px">${r.ref}</div>
      <div style="color:var(--t3);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.designation}</div>
      <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
        ${r.lignes&&r.lignes.length>0?r.lignes.map(l=>`<span class="tag tl" style="font-size:10px">${l}</span>`).join(''):'<span style="font-size:10px;color:var(--t3)">Toutes lignes</span>'}
        ${r.prix_unitaire>0?`<span class="tag" style="background:rgba(245,158,11,.1);color:var(--accent);border:1px solid rgba(245,158,11,.2);font-size:10px">💰 ${parseFloat(r.prix_unitaire).toFixed(2)} €</span>`:''}
      </div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="bi" onclick="openEditRef('${r.id}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="bi danger" onclick="deleteRef('${r.id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
    </div>
  </div>`).join('')}`;
}

function refForm(r){
  const lignes = r&&r.lignes ? r.lignes : [];
  return `
    <div class="field"><label>Numéro de référence *</label><input type="text" id="r-ref" value="${r?r.ref:''}" placeholder="REF-XXX"></div>
    <div class="field"><label>Désignation *</label><input type="text" id="r-des" value="${r?r.designation:''}" placeholder="Description de la pièce"></div>
    <div class="field"><label>Lignes associées <span style="font-weight:400;text-transform:none;color:var(--t3)">(laisser vide = toutes les lignes)</span></label>
      <div class="cg" style="margin-top:4px">
        ${LINES.map(l=>`<div class="chip${lignes.includes(l)?' on':''}" onclick="toggleLigne(this,'${l}')" data-ligne="${l}">${l}</div>`).join('')}
      </div>
    </div>
    <div class="field"><label>Prix de coût unitaire (€) <span style="font-weight:400;text-transform:none;color:var(--t3)">(facultatif)</span></label>
      <input type="number" id="r-prix" value="${r&&r.prix_unitaire?r.prix_unitaire:''}" placeholder="ex: 2.50" step="0.01" min="0">
    </div>
    <div class="field"><label>Photo <span style="font-weight:400;text-transform:none;color:var(--t3)">(facultative)</span></label>
      <div class="pu" onclick="document.getElementById('r-photo-input').click()">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <p>Ajouter une photo</p>
        <input type="file" id="r-photo-input" accept="image/*" style="display:none" onchange="previewPhoto(this,'r-photo-preview')">
      </div>
      <div id="r-photo-preview">${r&&r.photo?`<img src="${r.photo}" class="pp">`:''}</div>
    </div>
    <button class="btn bp bfw" onclick="${r?`saveEditRef('${r.id}')`:'saveAddRef()'}"><svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> ${r?'Sauvegarder':'Ajouter'}</button>`;
}

function toggleLigne(el, ligne){
  el.classList.toggle('on');
}

function getSelectedLignes(){
  return [...document.querySelectorAll('#modal-body .chip.on[data-ligne]')].map(el=>el.dataset.ligne);
}

function openAddRef(){ openModal('Ajouter une référence',refForm(null)); setTimeout(()=>document.getElementById('r-ref')?.focus(),100); }
function openEditRef(id){ const r=state.refs.find(x=>x.id===id); if(r)openModal('Modifier une référence',refForm(r)); }

async function saveAddRef(){
  const ref=document.getElementById('r-ref').value.trim();
  const designation=document.getElementById('r-des').value.trim();
  if(!ref||!designation)return;
  const img=document.querySelector('#r-photo-preview img');
  const lignes=getSelectedLignes();
  const prix_unitaire=parseFloat(document.getElementById('r-prix')?.value)||0;
  syncStart();
  try {
    await sbInsert('references_pieces',{ref,designation,photo:img?img.src:null,lignes,prix_unitaire});
  } catch(e){toast('Erreur: '+(e?.message||e),'err');syncEnd();return;}
  await loadRefs();
  syncEnd();
  toast('✓ '+ref+' ajoutée');
  openModal('Ajouter une référence',`<div style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:var(--r);padding:9px 14px;margin-bottom:14px;font-size:13px;color:var(--green)">✅ <strong>${ref}</strong> — ${designation} ajoutée (${state.refs.length} au total)</div>${refForm(null)}`);
  setTimeout(()=>document.getElementById('r-ref')?.focus(),100);
}

async function saveEditRef(id){
  const ref=document.getElementById('r-ref').value.trim();
  const designation=document.getElementById('r-des').value.trim();
  if(!ref||!designation)return;
  const img=document.querySelector('#r-photo-preview img');
  const orig=state.refs.find(x=>x.id===id);
  const lignes=getSelectedLignes();
  const prix_unitaire=parseFloat(document.getElementById('r-prix')?.value)||0;
  syncStart();
  await sbUpdate('references_pieces',id,{ref,designation,photo:img?img.src:orig?.photo,lignes,prix_unitaire});
  await loadRefs();
  syncEnd();
  closeModal();
  toast('Référence modifiée ✓');
  render();
}

async function deleteRef(id){
  syncStart();
  await sbDelete('references_pieces',id);
  await loadRefs();
  syncEnd();
  toast('Référence supprimée','err');
  render();
}

// ── USERS ─────────────────────────────────────────────────────────────────────
function renderUsers(){
  return `
  <div class="ph">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div class="pt">Équipe</div><div class="ps">${state.users.length} utilisateur${state.users.length>1?'s':''}</div></div>
      <button class="btn bp bsm" onclick="openAddUser()" style="margin-top:4px;display:flex;align-items:center;gap:6px"><svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Ajouter</button>
    </div><div class="al"></div>
  </div>
  ${state.users.map(u=>`<div class="rc">
    <div class="rimg" style="background:var(--s3);font-family:var(--fd);font-size:18px;font-weight:800;color:var(--accent)">${u.nom.charAt(0).toUpperCase()}</div>
    <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:15px">${u.nom}</div></div>
    <div style="display:flex;gap:6px">
      <button class="bi" onclick="openEditUser('${u.id}','${u.nom.replace(/'/g,"\\'")}')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="bi danger" onclick="deleteUser('${u.id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
    </div>
  </div>`).join('')}`;
}

function openAddUser(){ openModal('Ajouter un utilisateur',`<div class="field"><label>Prénom *</label><input type="text" id="u-name" placeholder="Ex: Jean Martin"></div><button class="btn bp bfw" onclick="saveAddUser()"><svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Ajouter</button>`); setTimeout(()=>document.getElementById('u-name')?.focus(),100); }
function openEditUser(id,nom){ openModal('Modifier le prénom',`<div class="field"><label>Prénom *</label><input type="text" id="u-name-edit" value="${nom}"></div><button class="btn bp bfw" onclick="saveEditUser('${id}')"><svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Sauvegarder</button>`); setTimeout(()=>document.getElementById('u-name-edit')?.focus(),100); }

async function saveAddUser(){
  const nom=document.getElementById('u-name').value.trim();
  if(!nom)return;
  syncStart();
  await sbInsert('utilisateurs',{nom});
  await loadUsers();
  syncEnd();
  closeModal();
  toast('Utilisateur ajouté ✓');
  render();
}

async function saveEditUser(id){
  const nom=document.getElementById('u-name-edit').value.trim();
  if(!nom)return;
  syncStart();
  await sbUpdate('utilisateurs',id,{nom});
  await loadUsers();
  syncEnd();
  closeModal();
  toast('Prénom modifié ✓');
  render();
}

async function deleteUser(id){
  syncStart();
  await sbDelete('utilisateurs',id);
  await loadUsers();
  syncEnd();
  toast('Utilisateur supprimé','err');
  render();
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function renderExport(){
  const total=state.decls.reduce((s,d)=>s+d.qty,0);
  return `
  <div class="ph"><div class="pt">Export</div><div class="al"></div></div>
  <div class="card" style="margin-bottom:12px"><div class="ct">Période</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field" style="margin:0"><label>Du</label><input type="date" id="exp-from"></div>
      <div class="field" style="margin:0"><label>Au</label><input type="date" id="exp-to"></div>
    </div>
  </div>
  <div class="sg" style="margin-bottom:16px">
    <div class="sc"><div class="sv">${state.decls.length}</div><div class="sl2">Déclarations</div></div>
    <div class="sc"><div class="sv" style="color:var(--red)">${total}</div><div class="sl2">Pièces</div></div>
  </div>
  <button class="btn bp bfw" style="margin-bottom:12px" onclick="doExport('xls')"><svg style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exporter en Excel (.xls)</button>
  <button class="btn bg bfw" onclick="doExport('csv')"><svg style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exporter en CSV</button>`;
}

function getExportData(){
  const from=document.getElementById('exp-from')?.value;
  const to=document.getElementById('exp-to')?.value;
  return state.decls.filter(d=>{
    const dt=new Date(d.created_at);
    if(from&&dt<new Date(from))return false;
    if(to&&dt>new Date(to+'T23:59:59'))return false;
    return true;
  });
}

function doExport(type){
  const data=getExportData();
  const refMap=Object.fromEntries(state.refs.map(r=>[r.ref,r.designation]));
  if(type==='csv'){
    const hdr=['Date','Utilisateur','Référence','Désignation','Ligne','Équipe','Quantité','Motif','Commentaire'];
    const rows=data.map(d=>[fmtDate(d.created_at),d.utilisateur,d.ref,refMap[d.ref]||'',d.ligne,d.equipe,d.qty,d.motif,d.comment||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';'));
    const csv='\uFEFF'+[hdr.join(';'),...rows].join('\n');
    dl(new Blob([csv],{type:'text/csv;charset=utf-8;'}),`rebuts_${new Date().toISOString().slice(0,10)}.csv`);
  }else{
    const rows=data.map(d=>`<tr><td>${fmtDate(d.created_at)}</td><td>${d.utilisateur}</td><td>${d.ref}</td><td>${refMap[d.ref]||''}</td><td>${d.ligne}</td><td>${d.equipe}</td><td>${d.qty}</td><td>${d.motif}</td><td>${d.comment||''}</td></tr>`).join('');
    const html=`<html><head><meta charset="UTF-8"></head><body><table border="1"><tr><th>Date</th><th>Utilisateur</th><th>Référence</th><th>Désignation</th><th>Ligne</th><th>Équipe</th><th>Quantité</th><th>Motif</th><th>Commentaire</th></tr>${rows}</table></body></html>`;
    dl(new Blob([html],{type:'application/vnd.ms-excel'}),`rebuts_${new Date().toISOString().slice(0,10)}.xls`);
  }
  toast('Export téléchargé ✓');
}

function dl(blob,name){ const url=URL.createObjectURL(blob); const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url); }

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
